<!DOCTYPE html>
<html>
<head>
    <title>Triage AI System</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #020617);
            color: white;
            text-align: center;
            padding: 30px;
            overflow-x: hidden;
        }

     
        body::before, body::after {
            content: "";
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            animation: float 12s infinite alternate ease-in-out;
        }

        body::before {
            background: #22c55e;
            top: -100px;
            left: -100px;
        }

        body::after {
            background: #3b82f6;
            bottom: -120px;
            right: -120px;
        }

        @keyframes float {
            from { transform: translateY(0px) scale(1); }
            to { transform: translateY(60px) scale(1.2); }
        }

        h1 {
            font-size: 2.6rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
            animation: fadeUp 0.6s ease;
        }

        p {
            color: #94a3b8;
            animation: fadeUp 0.8s ease;
        }

        .container {
            max-width: 600px;
            margin: auto;
        }

        .card {
            background: rgba(30, 41, 59, 0.75);
            backdrop-filter: blur(12px);
            padding: 20px;
            margin-top: 20px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
            animation: fadeUp 0.7s ease;
        }

        .card:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 30px 70px rgba(0,0,0,0.6);
        }

        button {
            background: linear-gradient(135deg, #22c55e, #4ade80);
            border: none;
            padding: 12px 20px;
            margin: 10px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 8px 20px rgba(34,197,94,0.3);
        }

        button:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 12px 30px rgba(34,197,94,0.5);
        }

        button:active {
            transform: scale(0.95);
        }

        pre {
            text-align: left;
            background: #020617;
            padding: 15px;
            border-radius: 10px;
            overflow-x: auto;
            animation: fadeUp 0.5s ease;
        }

        .tag {
            display: inline-block;
            padding: 6px 12px;
            margin: 5px;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 500;
            animation: pop 0.3s ease;
        }

        .billing { background: #ef4444; }
        .technical { background: #3b82f6; }
        .general { background: #a855f7; }

        
        .container::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 20px;
            padding: 2px;
            background: linear-gradient(45deg, #22c55e, #3b82f6, #a855f7);
            -webkit-mask:
                linear-gradient(#000 0 0) content-box,
                linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.15;
            pointer-events: none;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pop {
            from { transform: scale(0.6); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>

<body>

    <h1>Triage AI System</h1>
    <p>Multi-Agent Customer Support Classifier</p>

    <div class="container">

        <button onclick="resetEnv()">Reset</button>
        <button onclick="predict()">Predict</button>

        <div class="card">
            <h3>Message</h3>
            <p id="message">Click "Reset"</p>
        </div>

        <div class="card">
            <h3>Prediction</h3>
            <div id="tags"></div>
            <pre id="result"></pre>
        </div>

    </div>


<script>

let currentMessage = "";
const BASE_URL = window.location.origin;
async function resetEnv() {
    try {
        const res = await fetch(BASE_URL + '/reset', {
            method: 'POST'
        });

        const data = await res.json();   // ✅ THIS LINE WAS MISSING

        currentMessage = data.observation.message;

        document.getElementById("message").innerText = currentMessage;
        document.getElementById("result").innerText = "";
        document.getElementById("tags").innerHTML = "";

    } catch (err) {
        console.error("Reset Error:", err);
        alert("Reset failed");
    }
}
async function predict() {
    try {
        if (!currentMessage) return;

        let action;
        const text = currentMessage.toLowerCase();

        if (text.includes("payment") || text.includes("refund") || text.includes("charged") || text.includes("money")) {
            action = {"classify_as":"billing","priority":"high","assign_to":"billing_team"};
        } else if (text.includes("error") || text.includes("login") || text.includes("crash")) {
            action = {"classify_as":"technical","priority":"high","assign_to":"tech_team"};
        } else {
            action = {"classify_as":"general","priority":"low","assign_to":"support_team"};
        }

        const res = await fetch(BASE_URL + '/step', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(action)
        });

        const data = await res.json();

        const pred = data.info?.feedback?.predicted || action;

        document.getElementById("tags").innerHTML = `
            <span class="tag ${pred.classify_as}">${pred.classify_as}</span>
            <span class="tag">${pred.priority}</span>
        `;

        document.getElementById("result").innerText = JSON.stringify(data, null, 2);

    } catch (err) {
        console.error("Predict Error:", err);
        alert("Prediction failed. Check console.");
    }
}
</script>

</body>
</html>
